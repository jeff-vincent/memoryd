# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: memoryd

before:
  hooks:
    - go mod tidy

builds:
  - id: memoryd
    binary: memoryd
    main: ./cmd/memoryd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: memory-daemon
    name: memoryd
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  extra_files:
    - glob: dist/memoryd-tray-*
